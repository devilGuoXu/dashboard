<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广告数据大屏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a0f1e, #141a2e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { text-align: center; font-size: 36px; margin-bottom: 10px; background: linear-gradient(90deg, #00d2ff, #7b61ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .update-bar { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
        .update-time { color: #5a6380; font-size: 14px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-dot.loading { background: #ff9800; animation: pulse 1s infinite; }
        .status-dot.success { background: #4CAF50; }
        .status-dot.error { background: #f44336; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .total-summary { margin-bottom: 25px; padding: 24px; background: rgba(0,210,255,0.05); border-radius: 16px; border: 1px solid rgba(0,210,255,0.1); display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; }
        .summary-item { text-align: center; }
        .summary-label { font-size: 14px; color: #5a6380; margin-bottom: 8px; }
        .summary-value { font-size: 32px; font-weight: bold; color: #00d2ff; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .offer-card { background: rgba(255,255,255,0.06); border-radius: 20px; padding: 28px 24px; border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; transition: all 0.3s; }
        .offer-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #00d2ff, #7b61ff); }
        .offer-card:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .offer-name { font-size: 18px; font-weight: 600; color: #ccd6f6; margin-bottom: 18px; }
        .stats-row { display: flex; justify-content: space-between; gap: 12px; }
        .stat-item { flex: 1; }
        .stat-label { font-size: 13px; color: #5a6380; margin-bottom: 6px; }
        .stat-value { font-size: 30px; font-weight: bold; }
        .total-value { color: #00d2ff; }
        .avg-value { color: #7b61ff; }
        .no-data { text-align: center; color: #8892b0; padding: 60px; font-size: 18px; }
        .footer { margin-top: 30px; text-align: center; color: #3a4560; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 广告数据大屏</h1>
        <div class="update-bar">
            <span>状态：</span>
            <span class="status-dot loading" id="statusDot"></span>
            <span class="update-time" id="updateTime">加载中...</span>
        </div>
        <div class="total-summary" id="totalSummary" style="display:none;">
            <div class="summary-item"><div class="summary-label">广告总数</div><div class="summary-value" id="offerCount">0</div></div>
            <div class="summary-item"><div class="summary-label">交易总数</div><div class="summary-value" id="totalCount">0</div></div>
            <div class="summary-item"><div class="summary-label">总金额</div><div class="summary-value" id="totalAmount">$0</div></div>
            <div class="summary-item"><div class="summary-label">整体均价</div><div class="summary-value" id="overallAvg">$0</div></div>
        </div>
        <div class="card-grid" id="cardGrid"><div class="no-data">加载中...</div></div>
        <div class="footer">数据自动刷新 | GitHub Pages</div>
    </div>
    <script>
        function formatCurrency(n) { return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
        
        function setStatus(type) {
            var dot = document.getElementById('statusDot');
            dot.className = 'status-dot ' + type;
        }
        
        function updateDashboard(data) {
            if (!data || data.length === 0) {
                document.getElementById('cardGrid').innerHTML = '<div class="no-data">暂无数据</div>';
                document.getElementById('totalSummary').style.display = 'none';
                return;
            }
            document.getElementById('totalSummary').style.display = 'flex';
            
            var stats = {}, totalAmount = 0, totalCount = 0;
            data.forEach(function(row) {
                var offer = String(row.offer || '未知').trim();
                var price = parseFloat(String(row['价格'] || '0').replace(/[$,]/g, '')) || 0;
                if (!stats[offer]) stats[offer] = {total:0, count:0};
                stats[offer].total += price;
                stats[offer].count += 1;
                totalAmount += price;
                totalCount += 1;
            });
            
            var offers = Object.keys(stats).sort(function(a,b) { return stats[b].total - stats[a].total; });
            document.getElementById('offerCount').textContent = offers.length;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('totalAmount').textContent = formatCurrency(totalAmount);
            document.getElementById('overallAvg').textContent = totalCount > 0 ? formatCurrency(totalAmount/totalCount) : '$0.00';
            
            var html = '';
            offers.forEach(function(offer) {
                var s = stats[offer];
                html += '<div class="offer-card"><div class="offer-name">🎯 '+offer+'</div><div class="stats-row"><div class="stat-item"><div class="stat-label">总金额</div><div class="stat-value total-value">'+formatCurrency(s.total)+'</div></div><div class="stat-item"><div class="stat-label">均价</div><div class="stat-value avg-value">'+formatCurrency(s.total/s.count)+'</div></div></div></div>';
            });
            document.getElementById('cardGrid').innerHTML = html;
        }
        
        function loadData() {
            fetch('data.json?t=' + Date.now())
                .then(function(r) { return r.ok ? r.json() : Promise.reject('fail'); })
                .then(function(json) {
                    updateDashboard(json.data || json);
                    document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleTimeString('zh-CN');
                    setStatus('success');
                })
                .catch(function() {
                    document.getElementById('updateTime').textContent = '加载失败，重试中...';
                    setStatus('error');
                });
        }
        
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
